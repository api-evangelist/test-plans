specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Test Plans
providerId: test-plans
publisherName: Test Plans
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Documentation
  - Quality Assurance
  - Software Development
  - Test Management
  - Testing
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Test Plans API surface. Provides a FOCUS-aligned mapping
  for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Test Plans
  ServiceCategory: Developer Tools / API
  ProviderName: Test Plans
  PublisherName: Test Plans
  InvoiceIssuerName: Test Plans
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: TestRail API
    baseURL: https://yourproject.testrail.io/index.php?/api/v2
    tags:
      - Test Management
      - Test Plans
      - Test Runs
      - Testing
    serviceName: TestRail API
    serviceCategory: API
  - name: Jira Software API
    baseURL: https://your-org.atlassian.net/rest/agile/1.0
    tags:
      - Agile
      - Jira
      - Project Management
      - Test Planning
    serviceName: Jira Software API
    serviceCategory: API
  - name: Azure DevOps Test Plans API
    baseURL: https://dev.azure.com/{organization}/{project}/_apis/testplan
    tags:
      - Azure DevOps
      - CI/CD
      - Microsoft
      - Test Plans
    serviceName: Azure DevOps Test Plans API
    serviceCategory: API
  - name: qTest API
    baseURL: https://your-org.qtestnet.com/api/v3
    tags:
      - Agile Testing
      - Test Management
      - Test Plans
      - Tricentis
    serviceName: qTest API
    serviceCategory: API
  - name: ALM Octane API
    baseURL: https://your-octane.example.com/api/shared_spaces
    tags:
      - ALM
      - Enterprise Testing
      - Quality Management
      - Test Plans
    serviceName: ALM Octane API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
